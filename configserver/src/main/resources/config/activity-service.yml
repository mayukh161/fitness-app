spring:
  application:
    name: activity-service
  cloud:
    inetutils:
      preferred-networks:
        - 127.0.0
  data:
    mongodb:
      uri: mongodb://localhost:27017/fitness_activity
      database: fitness_activity
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: 127.0.0.1

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking